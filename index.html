<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Kuitansi BOSP PAUD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        /* CSS KHUSUS PRINT */
        @media print {
            /* Sembunyikan semua tombol dan elemen web saat ngeprint */
            #app-ui { display: none !important; }
            
            /* Tampilkan KHUSUS area kuitansi saat ngeprint */
            #print-section { 
                display: block !important; 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
            }
            @page {
                /* Paksa kertas ke A5 Landscape */
                size: 210mm 148mm; 
                margin: 0;
            }
            body { background-color: white !important; }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS (SVG Inlined agar tidak error) ---
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconToggleOn = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"></rect><circle cx="16" cy="12" r="3" fill="#2563eb"></circle></svg>;
        const IconToggleOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"></rect><circle cx="8" cy="12" r="3"></circle></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;

        // --- FUNGSI TERBILANG ---
        const terbilang = (angka) => {
            const bilangan = ['', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh', 'Sebelas'];
            let result = '';
            if (angka < 12) result = bilangan[angka];
            else if (angka < 20) result = terbilang(angka - 10) + ' Belas';
            else if (angka < 100) result = terbilang(Math.floor(angka / 10)) + ' Puluh ' + terbilang(angka % 10);
            else if (angka < 200) result = 'Seratus ' + terbilang(angka - 100);
            else if (angka < 1000) result = terbilang(Math.floor(angka / 100)) + ' Ratus ' + terbilang(angka % 100);
            else if (angka < 2000) result = 'Seribu ' + terbilang(angka - 1000);
            else if (angka < 1000000) result = terbilang(Math.floor(angka / 1000)) + ' Ribu ' + terbilang(angka % 1000);
            else if (angka < 1000000000) result = terbilang(Math.floor(angka / 1000000)) + ' Juta ' + terbilang(angka % 1000000);
            return result.trim();
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isPdfLoading, setIsPdfLoading] = useState(false);
            const [printMode, setPrintMode] = useState('single');
            
            const [schoolData, setSchoolData] = useState({
                nama: 'PAUD KASIH IBU',
                npsn: '69857379',
                alamat: 'GANG MASJID BAITUL GHOFUR, Kec. Patrol, Kab. Indramayu, Prov. Jawa Barat',
                kepsek: 'ECIH SUNENGSIH, S.Pd.',
                bendahara: 'NOVITA SARI'
            });

            const [rawTransactions, setRawTransactions] = useState([]);
            const [groupOptions, setGroupOptions] = useState({});
            const [penerimaMap, setPenerimaMap] = useState({});
            const [bpuList, setBpuList] = useState([]);
            const [selectedBpuId, setSelectedBpuId] = useState(null);

            const loadDemoData = () => {
                const demoData = [
                    { id: 'tx1', noBukti: 'BPU01', tanggal: '2026-01-23', uraian: 'Honorarium a.n ECIH SUNENGSIH Bulan Januari 2026', jumlah: 504900, penerima: 'Ecih Sunengsih' },
                    { id: 'tx2', noBukti: 'BPU02', tanggal: '2026-01-23', uraian: 'Honorarium a.n NOVITA SARI Bulan Januari 2026', jumlah: 392700, penerima: 'Novita Sari' },
                    { id: 'tx3', noBukti: 'BPU03', tanggal: '2026-01-23', uraian: 'Honorarium a.n TIRA HIDAYAT Bulan Januari 2026', jumlah: 224400, penerima: 'Tira Hidayat' },
                    { id: 'tx4', noBukti: 'BPU04', tanggal: '2026-01-23', uraian: 'Pembayaran Internet ASTINET MURNI 1:1 Bandwith: 1 Mbps', jumlah: 100000, penerima: 'Telkom' },
                    { id: 'tx5', noBukti: 'BPU05', tanggal: '2026-01-23', uraian: 'Pembayaran Listrik Golongan P1-Daya 6.600 VA 200 kVA', jumlah: 198900, penerima: 'PLN' },
                    { id: 'tx6', noBukti: 'BPU06', tanggal: '2026-01-24', uraian: 'Pembelian Kertas HVS A4 70gr 2 Rim', jumlah: 100000, penerima: '' },
                    { id: 'tx7', noBukti: 'BPU06', tanggal: '2026-01-24', uraian: 'Pembelian Tinta Printer Epson Hitam 2 Botol', jumlah: 150000, penerima: '' }
                ];
                const initialMap = {};
                demoData.forEach(tx => { if(tx.penerima) initialMap[tx.noBukti] = tx.penerima; });
                setPenerimaMap(initialMap);
                setRawTransactions(demoData);
                setStep(2);
            };

            const groupedByBukti = useMemo(() => {
                const groups = {};
                rawTransactions.forEach(tx => {
                    if (!groups[tx.noBukti]) groups[tx.noBukti] = [];
                    groups[tx.noBukti].push(tx);
                });
                return groups;
            }, [rawTransactions]);

            useEffect(() => {
                if (!rawTransactions.length) return;
                let list = [];
                Object.entries(groupedByBukti).forEach(([noBukti, items]) => {
                    const isGrouped = groupOptions[noBukti] !== false; 
                    if (isGrouped && items.length > 1) {
                        list.push({ id: noBukti, noBukti: noBukti, tanggal: items[0].tanggal, items: items, penerima: penerimaMap[noBukti] || '' });
                    } else {
                        items.forEach(item => {
                            list.push({ id: item.id, noBukti: noBukti, tanggal: item.tanggal, items: [item], penerima: penerimaMap[item.id] || penerimaMap[noBukti] || '' });
                        });
                    }
                });
                setBpuList(list);
            }, [groupedByBukti, groupOptions, penerimaMap]);

            const handleFileUpload = async (e) => {
                setIsPdfLoading(true);
                setTimeout(() => {
                    loadDemoData();
                    setIsPdfLoading(false);
                }, 1000);
            };

            const handleUpdatePenerima = (targetId, namaToko) => {
                setPenerimaMap(prev => ({ ...prev, [targetId]: namaToko }));
            };

            const handlePrint = (mode) => {
                setPrintMode(mode);
                setTimeout(() => window.print(), 200);
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
            };

            const ReceiptTemplate = ({ bpu }) => {
                if (!bpu) return null;
                const totalAmount = bpu.items.reduce((sum, item) => sum + item.jumlah, 0);
                return (
                    <div className="bg-white w-[210mm] h-[148mm] max-h-[148mm] overflow-hidden shadow-xl p-6 relative print:shadow-none print:w-[210mm] print:h-[148mm] print:max-h-[148mm] border-2 border-slate-800 print:border-0 mx-auto my-4 print:my-0 flex flex-col justify-between" style={{pageBreakInside: 'avoid'}}>
                        <div>
                            <div className="border-b-4 border-double border-slate-800 pb-2 mb-4">
                                <div className="text-center w-full">
                                    <h2 className="text-xl font-bold uppercase tracking-wider">{schoolData.nama}</h2>
                                    <p className="text-xs">NPSN: {schoolData.npsn}</p>
                                    <p className="text-[11px] italic">{schoolData.alamat}</p>
                                </div>
                            </div>
                            <div className="text-center mb-4">
                                <h1 className="text-xl font-bold uppercase underline decoration-2 underline-offset-4">Kuitansi Pembayaran</h1>
                                <p className="text-xs font-semibold mt-1">No. Bukti: {bpu.noBukti}</p>
                            </div>
                            <div className="space-y-3 text-sm">
                                <div className="flex">
                                    <div className="w-40 font-semibold">Telah terima dari</div><div className="w-4">:</div>
                                    <div className="flex-1 border-b border-dotted border-slate-400 pb-1 font-bold">Kepala Sekolah {schoolData.nama}</div>
                                </div>
                                <div className="flex items-center">
                                    <div className="w-40 font-semibold">Uang Sebesar</div><div className="w-4">:</div>
                                    <div className="flex-1 font-bold text-lg">
                                        <span className="bg-slate-100 px-3 py-1 rounded border border-slate-300 shadow-sm inline-block">Rp {totalAmount.toLocaleString('id-ID')} ,-</span>
                                    </div>
                                </div>
                                <div className="flex items-center">
                                    <div className="w-40 font-semibold">Terbilang</div><div className="w-4">:</div>
                                    <div className="flex-1 bg-slate-50 italic px-2 py-1 border-b border-slate-300 font-semibold leading-snug">== {terbilang(totalAmount)} Rupiah ==</div>
                                </div>
                                <div className="flex">
                                    <div className="w-40 font-semibold">Untuk Pembayaran</div><div className="w-4">:</div>
                                    <div className="flex-1 border-b border-dotted border-slate-400 pb-1 leading-snug">
                                        {bpu.items.length === 1 ? bpu.items[0].uraian : (
                                            <ul className="list-disc pl-4 space-y-0.5">
                                                {bpu.items.map((item, idx) => <li key={idx}>{item.uraian} <span className="font-semibold">(Rp {item.jumlah.toLocaleString('id-ID')})</span></li>)}
                                            </ul>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-auto flex justify-between items-end pt-4 px-2 w-full">
                            <div className="w-36 flex flex-col justify-between items-center h-24 text-[11px] text-center">
                                <div className="w-full"><p>Setuju dibayar,</p><p className="font-semibold">Kepala Sekolah</p></div>
                                <div className="w-full border-b border-slate-800 font-bold mt-auto">{schoolData.kepsek}</div>
                            </div>
                            <div className="w-36 flex flex-col justify-between items-center h-24 text-[11px] text-center">
                                <div className="w-full"><p>Lunas dibayar,</p><p className="font-semibold">Bendahara</p></div>
                                <div className="w-full border-b border-slate-800 font-bold mt-auto">{schoolData.bendahara}</div>
                            </div>
                            <div className="w-36 flex flex-col justify-between items-center h-24 text-[11px] text-center">
                                <div className="w-full text-right"><p>Patrol, {formatDate(bpu.tanggal)}</p><p className="font-semibold mt-0.5">Yang Menerima</p></div>
                                <div className="w-full border-b border-slate-800 font-bold mt-auto text-xs">{bpu.penerima || '(............................)'}</div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="font-sans">
                    {/* BAGIAN UI WEB (Tampil di layar, sembunyi pas print) */}
                    <div id="app-ui" className="min-h-screen flex flex-col bg-slate-100">
                        <header className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-20">
                            <div className="flex items-center gap-3">
                                <IconFileText />
                                <div><h1 className="text-xl font-bold">Auto Kuitansi BOSP</h1><p className="text-xs text-blue-100">{schoolData.nama}</p></div>
                            </div>
                        </header>

                        {step === 1 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-6 print:hidden">
                                <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center border border-slate-200">
                                    <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600"><IconUpload /></div>
                                    <h2 className="text-2xl font-bold text-slate-800 mb-2">Upload File BKU</h2>
                                    <p className="text-sm text-slate-500 mb-6">Unggah file PDF dari ARKAS.</p>
                                    <label className="block w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg cursor-pointer font-semibold transition-colors mb-4">
                                        {isPdfLoading ? 'Membaca...' : 'Pilih File PDF'}
                                        <input type="file" accept=".pdf" className="hidden" onChange={handleFileUpload} disabled={isPdfLoading} />
                                    </label>
                                    <button onClick={loadDemoData} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 px-4 rounded-lg font-semibold">Gunakan Data Contoh (Demo)</button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="flex-1 p-6 overflow-y-auto print:hidden">
                                <div className="max-w-4xl mx-auto">
                                    <div className="flex justify-between items-end mb-6 bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Lengkapi Data Toko</h2>
                                            <p className="text-sm text-slate-500">Isi penerima. Bisa atur opsi gabung kuitansi per-BPU.</p>
                                        </div>
                                        <button onClick={() => { setSelectedBpuId(bpuList[0]?.id); setStep(3); }} className="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-lg font-bold flex items-center gap-2">
                                            <IconCheck /> Lanjut Preview
                                        </button>
                                    </div>
                                    <div className="space-y-4">
                                        {Object.entries(groupedByBukti).map(([noBukti, items]) => {
                                            const isGrouped = groupOptions[noBukti] !== false;
                                            const hasMultiple = items.length > 1;
                                            const totalAmount = items.reduce((sum, item) => sum + item.jumlah, 0);
                                            return (
                                                <div key={noBukti} className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 mb-4">
                                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                                                        <div>
                                                            <span className="inline-block bg-blue-100 text-blue-800 font-bold px-2 py-1 rounded text-xs mr-2 border border-blue-200">{noBukti}</span>
                                                            <span className="text-sm font-semibold text-slate-600">{formatDate(items[0].tanggal)}</span>
                                                        </div>
                                                        {hasMultiple && (
                                                            <button onClick={() => setGroupOptions(prev => ({...prev, [noBukti]: !isGrouped}))} className="flex items-center gap-1.5 text-sm font-semibold bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                                                                {isGrouped ? <IconToggleOn /> : <IconToggleOff />} {isGrouped ? 'Kuitansi Digabung' : 'Kuitansi Dipisah'}
                                                            </button>
                                                        )}
                                                    </div>
                                                    {isGrouped ? (
                                                        <div className="flex gap-6">
                                                            <div className="w-1/4 pr-4 border-r border-slate-100">
                                                                <p className="text-lg font-bold text-slate-800">Rp {totalAmount.toLocaleString('id-ID')}</p>
                                                            </div>
                                                            <div className="flex-1">
                                                                <input type="text" className="w-full border border-slate-300 rounded-md p-2 text-sm mb-3" placeholder="Ketik nama toko / penerima..." value={penerimaMap[noBukti] || ''} onChange={(e) => handleUpdatePenerima(noBukti, e.target.value)} />
                                                                <div className="bg-slate-50 rounded p-3 text-sm text-slate-700">
                                                                    <ul className="list-disc pl-4 space-y-1">
                                                                        {items.map(item => <li key={item.id}>{item.uraian}</li>)}
                                                                    </ul>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-4">
                                                            {items.map((item, idx) => (
                                                                <div key={item.id} className="flex gap-6 border-b border-slate-100 pb-4">
                                                                    <div className="w-1/4 pr-4 border-r border-slate-100"><p className="text-lg font-bold text-slate-800">Rp {item.jumlah.toLocaleString('id-ID')}</p></div>
                                                                    <div className="flex-1">
                                                                        <input type="text" className="w-full border border-slate-300 rounded-md p-2 text-sm mb-2" placeholder="Nama toko..." value={penerimaMap[item.id] || ''} onChange={(e) => handleUpdatePenerima(item.id, e.target.value)} />
                                                                        <div className="bg-slate-50 rounded p-2 text-sm text-slate-700">{item.uraian}</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="flex-1 flex overflow-hidden">
                                <div className="w-1/4 bg-white border-r border-slate-200 flex flex-col print:hidden">
                                    <div className="p-4 border-b border-slate-100 bg-slate-50 font-bold text-slate-700">Daftar Kuitansi</div>
                                    <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                        {bpuList.map((bpu) => (
                                            <div key={bpu.id} onClick={() => setSelectedBpuId(bpu.id)} className={`p-3 rounded-md border cursor-pointer ${selectedBpuId === bpu.id ? 'border-blue-500 bg-blue-50' : 'border-slate-200'}`}>
                                                <div className="flex justify-between items-center mb-1"><span className="text-xs font-bold bg-white border border-slate-200 px-1.5 py-0.5 rounded text-slate-600">{bpu.noBukti}</span></div>
                                                <p className="text-sm font-semibold text-slate-800">{bpu.penerima || '(Toko Belum Diisi)'}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-3/4 flex flex-col bg-slate-200 print:w-full print:bg-white">
                                    <div className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 print:hidden">
                                        <button onClick={() => setStep(2)} className="flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-blue-600 bg-slate-100 px-3 py-1.5 rounded-md"><IconBack /> Edit</button>
                                        <div className="flex gap-3 items-center">
                                            <span className="text-xs font-semibold text-orange-600 italic mr-2">*Set Landscape di dialog print</span>
                                            <button onClick={() => handlePrint('single')} className="flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-md font-medium"><IconPrinter /> Cetak 1 Ini</button>
                                            <button onClick={() => handlePrint('all')} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-md font-medium"><IconPrinter /> Cetak Semua</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-8">{selectedBpuId && <ReceiptTemplate bpu={bpuList.find(b => b.id === selectedBpuId)} />}</div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* BAGIAN KHUSUS CETAK (Tampil pas print aja) */}
                    <div id="print-section" className="hidden">
                        {printMode === 'all' ? bpuList.map((bpu, index) => (
                            <div key={bpu.id} style={{ pageBreakAfter: index === bpuList.length - 1 ? 'auto' : 'always' }}><ReceiptTemplate bpu={bpu} /></div>
                        )) : <ReceiptTemplate bpu={bpuList.find(b => b.id === selectedBpuId)} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
